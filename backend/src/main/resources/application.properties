server.port=8080

# --- MySQL ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sports_career_pro_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:SPRK@2007}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# --- JPA/Hibernate ---
# 'validate' = verify tables exist (safe for production)
# 'update'   = auto-create/alter tables (ok for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- JSON formatting ---
spring.jackson.serialization.indent-output=true

# --- Logging ---
logging.level.com.careerpro=DEBUG

